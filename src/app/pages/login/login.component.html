<div class="flex items-center justify-center h-300 bg-indigo">
  <div class="bg-white p-10 rounded-xl shadow-xl text-center">
    <form>
      <label for="username" class="block text-x1 fon-semibold mb-2 text-xl">Username:</label>
      <input 	class= "-webkit-box-decoration-break: slice;box-decoration-break: slice; border-2 border-black rounded w-80 h-12 text-lg px-4 mb-6" type="text" id="username" name="username"><br>
<div>
<div class="relative">
      <input  [type]="showPassword ? 'text' : 'Password'" id="pwd" name="pwd" class= "peer block w-full appearance-none rounded-lg border-1 border-gray-300 bg-transparent px-2.5 pt-4 pb-2.5 text-sm text-gray-900 focus:border-blue-600 focus:ring-0 focus:outline-none">
        <label for="pwd" class="absolute start-1 top-2 z-10 origin-[0] -translate-y-4 scale-75 transform cursor-text bg-white px-2 text-sm text-gray-500 duration-300 peer-placeholder-shown:top-1/2 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:scale-100 peer-focus:top-2 peer-focus:-translate-y-4 peer-focus:scale-75 peer-focus:px-2 peer-focus:text-blue-600 rtl:peer-focus:left-auto rtl:peer-focus:translate-x-1/4">Password:</label>
      <button type="button" (click)="togglePassword()" class="absolute inset-y-0 right-0 z-20">
                <svg
                  class="size-3.5 shrink-0"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    [class.hidden]="!showPassword"
                    d="M9.88 9.88a3 3 0 1 0 4.24 4.24"
                  ></path>
                  <path
                    [class.hidden]="!showPassword"
                    d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
                  ></path>
                  <path
                    [class.hidden]="!showPassword"
                    d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"
                  ></path>
                  <line
                    [class.hidden]="!showPassword"
                    x1="2"
                    x2="22"
                    y1="2"
                    y2="22"
                  ></line>

                  <path
                    [class.hidden]="showPassword"
                    d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"
                  ></path>
                  <circle
                    [class.hidden]="showPassword"
                    cx="12"
                    cy="12"
                    r="3"
                  ></circle>
                </svg>
              </button>
              </div>
</div>
      <div>
        <br>
      </div>
      <input type="button" value="Login" class="w-50 h-10 text-lg px-3 mb-5  border-2 border-black rounded">
    </form>
  </div>
</div>
